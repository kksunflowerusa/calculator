<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>B4運費計算器2</title>

<style>
  body {font-family: Arial, sans-serif; max-width: 800px; margin: 30px auto; padding: 20px;}
  label {display:block; margin-top:10px;}
  input[type="number"], select {margin-top:5px; padding:6px; width:100%; box-sizing:border-box;}
  button {margin-top:15px; padding:8px 15px;}
  #packages {margin-top:20px;}
  .pkg-block {border:1px solid #ccc; padding:15px; margin-top:15px; background:#f9f9f9;}
  .surcharge {color:#b00020; font-weight:bold;}
</style>
</head>

<body>

<h2>B4 運費計算器2</h2>

<label>件數：
  <input type="number" id="packageCount" value="1" min="1" step="1" onchange="renderPackageInputs()">
</label>

<label>會員折扣（例：95折 = 0.95）：
  <input type="number" id="discountRate" value="1" step="0.01">
</label>

<div id="packages"></div>

<button onclick="calculate()">計算金額</button>

<div id="output"></div>

<script>
function parseNumberLoose(v){
  const n = parseFloat(String(v).replace(/[^\d.\-]/g,''));
  return Number.isFinite(n) ? n : NaN;
}

function findRateInObj(obj){
  if(!obj) return null;
  const recur = (o,d=0)=>{
    if(d>6||!o) return null;
    if(typeof o==='number'&&o>1&&o<200) return o;
    if(typeof o==='string'){
      const n=parseNumberLoose(o);
      if(n>1&&n<200) return n;
    }
    if(Array.isArray(o)){
      for(const x of o){ const r=recur(x,d+1); if(r) return r; }
    }else if(typeof o==='object'){
      for(const k in o){ const r=recur(o[k],d+1); if(r) return r; }
    }
    return null;
  };
  return recur(obj,0);
}

function renderPackageInputs(){
  const c = +document.getElementById('packageCount').value || 1;
  const box = document.getElementById('packages');
  box.innerHTML='';

  for(let i=1;i<=c;i++){
    box.innerHTML+=`
      <div class="pkg-block">
        <strong>第 ${i} 件</strong>

        <label>輸入單位：
          <select id="unit${i}" onchange="updateUnitLabels(${i})">
            <option value="cmkg">公分 + 公斤</option>
            <option value="inlb">英寸 + 磅</option>
          </select>
        </label>

        <label id="labelL${i}">長 (cm)：<input type="number" id="l${i}" step="0.01"></label>
        <label id="labelW${i}">寬 (cm)：<input type="number" id="w${i}" step="0.01"></label>
        <label id="labelH${i}">高 (cm)：<input type="number" id="h${i}" step="0.01"></label>
        <label id="labelWeight${i}">重量 (kg)：<input type="number" id="kg${i}" step="0.01"></label>
      </div>`;
  }
}

function updateUnitLabels(i){
  const unit = document.getElementById(`unit${i}`).value;

  if(unit === 'cmkg'){
    document.getElementById(`labelL${i}`).innerHTML = `長 (cm)：<input type="number" id="l${i}" step="0.01">`;
    document.getElementById(`labelW${i}`).innerHTML = `寬 (cm)：<input type="number" id="w${i}" step="0.01">`;
    document.getElementById(`labelH${i}`).innerHTML = `高 (cm)：<input type="number" id="h${i}" step="0.01">`;
    document.getElementById(`labelWeight${i}`).innerHTML = `重量 (kg)：<input type="number" id="kg${i}" step="0.01">`;
  }else{
    document.getElementById(`labelL${i}`).innerHTML = `長 (in)：<input type="number" id="l${i}" step="0.01">`;
    document.getElementById(`labelW${i}`).innerHTML = `寬 (in)：<input type="number" id="w${i}" step="0.01">`;
    document.getElementById(`labelH${i}`).innerHTML = `高 (in)：<input type="number" id="h${i}" step="0.01">`;
    document.getElementById(`labelWeight${i}`).innerHTML = `重量 (lb)：<input type="number" id="kg${i}" step="0.01">`;
  }
}

renderPackageInputs();

async function calculate(){
  const count = +packageCount.value || 1;
  const discount = parseFloat(document.getElementById('discountRate').value) || 1;

  let rate=null;
  try{
    const r = await fetch('https://script.google.com/macros/s/AKfycbx6jRRXCt3xgWVQBulc945UAe6nS1HtaxDVcvxixzYbNdDT7iY_nir4EzvRyGRtXA/exec');
    rate = findRateInObj(await r.json());
  }catch{}

  const finalRate = rate ? rate + 0.8 : null;

  let packages=[];
  let totalLb=0;

  for(let i=1;i<=count;i++){
    const unit = document.getElementById(`unit${i}`).value;

    const inputL = +document.getElementById(`l${i}`).value || 0;
    const inputW = +document.getElementById(`w${i}`).value || 0;
    const inputH = +document.getElementById(`h${i}`).value || 0;
    const inputWeight = +document.getElementById(`kg${i}`).value || 0;

    let L, W, H, actLb;

    if(unit === 'cmkg'){
      L = Math.ceil(inputL / 2.54);
      W = Math.ceil(inputW / 2.54);
      H = Math.ceil(inputH / 2.54);
      actLb = Math.ceil(inputWeight / 0.454);
    }else{
      L = Math.ceil(inputL);
      W = Math.ceil(inputW);
      H = Math.ceil(inputH);
      actLb = Math.ceil(inputWeight);
    }

    const volLb = Math.ceil((L * W * H) / 139);
    const chgLb = Math.max(volLb, actLb);

    const sides=[L,W,H].sort((a,b)=>b-a);
    const longest=sides[0];
    const second=sides[1];
    const shortest=sides[2];
    const lengthPlusGirth=longest + 2*second + 2*shortest;

    let dimensionSurcharge=0;
    let oversizeSurcharge=0;
    let weightSurcharge=0;
    let surchargeText='';

    if(longest>46 || second>28 || lengthPlusGirth>100){
      dimensionSurcharge=35;
      surchargeText += `<span class="surcharge">額外服務附加費 – 尺寸：$35</span><br>`;
    }

    if(longest>90 || lengthPlusGirth>120){
      oversizeSurcharge=85;
      surchargeText += `<span class="surcharge">超大尺寸費用：$85</span><br>`;
    }

    if(volLb>=50 || actLb>=50){
      weightSurcharge=35;
      surchargeText += `<span class="surcharge">額外服務附加費 – 重量：$35</span><br>`;
    }

    if(!surchargeText){
      surchargeText='無附加費<br>';
    }

    const surchargeTotal=dimensionSurcharge + oversizeSurcharge + weightSurcharge;

    totalLb+=chgLb;

    packages.push({
      i,L,W,H,volLb,actLb,chgLb,
      longest,second,shortest,lengthPlusGirth,
      surchargeText,surchargeTotal,
      unit
    });
  }

  let extraLbRate=null;

  if(totalLb<50){
    extraLbRate=7;
  }else if(totalLb<160){
    extraLbRate=6.49;
  }else{
    extraLbRate=5.99;
  }

  let html='';
  let totalBeforeDiscount=0;
  let totalAfterDiscount=0;
  let totalSurcharge=0;

  packages.forEach(p=>{
    const base = 30 + (p.chgLb > 1 ? (p.chgLb - 1) * extraLbRate : 0);
    const discounted = base * discount;

    totalBeforeDiscount += base;
    totalAfterDiscount += discounted;
    totalSurcharge += p.surchargeTotal;

    const twdBefore = finalRate ? Math.ceil(base * finalRate) : 'N/A';
    const twdAfter = finalRate ? Math.ceil(discounted * finalRate) : 'N/A';

    html += `
      <div class="pkg-block">
        <strong>第 ${p.i} 件</strong><br>
        輸入單位：${p.unit === 'cmkg' ? '公分 + 公斤' : '英寸 + 磅'}<br>
        尺寸：${p.L} × ${p.W} × ${p.H} in<br>
        最長邊：${p.longest} in｜第二長邊：${p.second} in<br>
        長度加周長：${p.longest} + 2 × ${p.second} + 2 × ${p.shortest} = ${p.lengthPlusGirth} in<br>
        材積重：${p.volLb} lb<br>
        實重：${p.actLb} lb<br>
        計費重：${p.chgLb} lb<br><br>

        原始運費：$${base.toFixed(2)} / NT$${twdBefore}<br>
        折扣後運費：$${discounted.toFixed(2)} / NT$${twdAfter}<br><br>

        <strong>附加費：</strong><br>
        ${p.surchargeText}
        附加費小計：$${p.surchargeTotal.toFixed(2)}
      </div>`;
  });

  const pickup = count * 5;
  const totalFinal = totalAfterDiscount + pickup + totalSurcharge;
  const totalTwd = finalRate ? Math.ceil(totalFinal * finalRate) : 'N/A';

  html += `
    <div class="pkg-block" style="border-top:2px solid #000">
      <strong>B4 運費總計</strong><br>
      合併重量：${totalLb} 磅<br>
      續磅單價：$${extraLbRate}<br>
      折扣前運費合計：$${totalBeforeDiscount.toFixed(2)}<br>
      折扣後運費合計：$${totalAfterDiscount.toFixed(2)}<br>
      取件費：$${pickup.toFixed(2)}<br>
      附加費合計：$${totalSurcharge.toFixed(2)}<br>
      <strong>應付總額：$${totalFinal.toFixed(2)} / NT$${totalTwd}</strong><br>
      匯率：${finalRate ? finalRate.toFixed(3) : 'N/A'}
    </div>
  `;

  output.innerHTML = html;
}
</script>

</body>
</html>
