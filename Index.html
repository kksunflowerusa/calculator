<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B5運費計算器2</title>
<style>
  body {font-family: Arial, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px;}
  label {display:block; margin-top:10px;}
  input[type="number"], input[type="text"] {margin-top:5px; padding:6px; width:100%; box-sizing:border-box;}
  button {margin-top:15px; padding:8px 15px;}
  #output {margin-top:20px; padding:12px; border:1px solid #ccc; background:#f9f9f9;}
  #debug {margin-top:12px; padding:8px; border:1px dashed #888; background:#fff;}
  .small {font-size:0.9rem; color:#555;}
  .package-box {border:1px solid #ddd; padding:12px; margin-top:15px; background:#fff;}
  .package-result {border:1px solid #ccc; padding:10px; margin-top:12px; background:#fff;}
  .total-box {border:2px solid #333; padding:12px; margin-top:15px; background:#fff;}
  .surcharge {color:#b00020; font-weight:bold;}
</style>
</head>
<body>
<h2>B5運費計算器</h2>

<label>包裹件數：
  <input type="number" id="packageCount" step="1" min="1" value="1" oninput="renderPackages()">
</label>

<label>會員折扣：
  <input type="number" id="discountRate" step="0.01" min="0" value="1" placeholder="例如 95 折請輸入 0.95">
</label>
<div class="small">折扣只套用每磅 $4.99 的部分；每磅 $1.2 美國國內運費與附加費不折扣。</div>

<div id="packages"></div>

<button onclick="calculate()">計算金額</button>

<div id="output"></div>
<div id="debug" class="small" style="display:none;"></div>

<script>
function renderPackages() {
  const count = parseInt(document.getElementById('packageCount').value) || 1;
  const container = document.getElementById('packages');
  container.innerHTML = '';

  for (let i = 1; i <= count; i++) {
    const div = document.createElement('div');
    div.className = 'package-box';
    div.innerHTML = `
      <h3>包裹 ${i}</h3>
      <label>長 (公分)：<input type="number" id="length${i}" step="0.01"></label>
      <label>寬 (公分)：<input type="number" id="width${i}" step="0.01"></label>
      <label>高 (公分)：<input type="number" id="height${i}" step="0.01"></label>
      <label>外箱重量 (公斤)：<input type="number" id="weight${i}" step="0.01"></label>
      <label>內箱件數：
        <input type="number" id="innerCount${i}" step="1" min="0" value="0">
      </label>
      <div class="small">內箱不需輸入每件重量；每件收取 $6 服務費。</div>
    `;
    container.appendChild(div);
  }
}

function findRateInObj(obj) {
  if (!obj) return null;
  const keys = ['usdCashSell','usdSell','cashSell','sell','rate','exchangeRate','usd_to_twd','usdToTwd','USDTWD','TWD'];

  for (const k of Object.keys(obj)) {
    const val = parseFloat(obj[k]);
    if (keys.some(c => k.toLowerCase() === c.toLowerCase()) && Number.isFinite(val) && val > 1 && val < 200) return val;
  }

  if (obj.rates && obj.rates.TWD) {
    const n = parseFloat(obj.rates.TWD);
    if (Number.isFinite(n) && n > 1 && n < 200) return n;
  }

  if (obj.TWD) {
    const n = parseFloat(obj.TWD);
    if (Number.isFinite(n) && n > 1 && n < 200) return n;
  }

  function rec(o, d = 0) {
    if (d > 6 || !o) return null;
    if (typeof o === 'number' && o > 1 && o < 200) return o;
    if (typeof o === 'string') {
      const v = parseFloat(o);
      if (v > 1 && v < 200) return v;
    }
    if (Array.isArray(o)) {
      for (const el of o) {
        const r = rec(el, d + 1);
        if (r) return r;
      }
    }
    if (typeof o === 'object') {
      for (const k of Object.keys(o)) {
        const r = rec(o[k], d + 1);
        if (r) return r;
      }
    }
    return null;
  }

  return rec(obj);
}

async function calculate() {
  const debugEl = document.getElementById('debug');
  debugEl.style.display = 'none';
  debugEl.innerHTML = '';

  const packageCount = parseInt(document.getElementById('packageCount').value) || 1;
  const discountRate = parseFloat(document.getElementById('discountRate').value);
  const finalDiscountRate = Number.isFinite(discountRate) && discountRate > 0 ? discountRate : 1;

  let totalBeforeDiscountUsd = 0;
  let totalAfterDiscountUsd = 0;
  let totalSurchargeUsd = 0;
  let resultHtml = '';
  let debugMsg = '';

  for (let i = 1; i <= packageCount; i++) {
    const lengthCm = parseFloat(document.getElementById(`length${i}`).value) || 0;
    const widthCm  = parseFloat(document.getElementById(`width${i}`).value) || 0;
    const heightCm = parseFloat(document.getElementById(`height${i}`).value) || 0;
    const weightKg = parseFloat(document.getElementById(`weight${i}`).value) || 0;
    const innerCount = parseInt(document.getElementById(`innerCount${i}`).value) || 0;

    const lengthIn = Math.ceil(lengthCm / 2.54);
    const widthIn  = Math.ceil(widthCm / 2.54);
    const heightIn = Math.ceil(heightCm / 2.54);

    const sides = [lengthIn, widthIn, heightIn].sort((a, b) => b - a);
    const longestSide = sides[0];
    const secondLongestSide = sides[1];
    const shortestSide = sides[2];
    const lengthPlusGirth = longestSide + 2 * secondLongestSide + 2 * shortestSide;

    const volumetricLb = Math.ceil((lengthIn * widthIn * heightIn) / 139);
    const actualLb = Math.ceil(weightKg / 0.454);
    const chargeableLb = Math.max(volumetricLb, actualLb);

    const internationalBeforeDiscount = chargeableLb * 4.99;
    const internationalAfterDiscount = internationalBeforeDiscount * finalDiscountRate;
    const usDomesticFee = chargeableLb * 1.2;
    const innerBoxFee = innerCount * 6;

    let twServiceFee = 0;
    let twServiceFeeText = 'TW 服務費 = $0';
    if (chargeableLb >= 1 && chargeableLb <= 10) {
      twServiceFee = 12;
      twServiceFeeText = 'TW 服務費 = $12';
    } else if (chargeableLb >= 11 && chargeableLb <= 20) {
      twServiceFee = 6;
      twServiceFeeText = 'TW 服務費 = $6';
    }

    let dimensionSurcharge = 0;
    let oversizeSurcharge = 0;
    let weightSurcharge = 0;
    let surchargeDetails = '';

    if (
      longestSide > 46 ||
      secondLongestSide > 28 ||
      lengthPlusGirth > 100
    ) {
      dimensionSurcharge = 35;
      surchargeDetails += `
        <span class="surcharge">額外服務附加費 – 尺寸：$35</span><br>
        觸發條件：最長邊 ${longestSide} in、第二長邊 ${secondLongestSide} in、長度加周長 ${lengthPlusGirth} in<br>
      `;
    }

    if (
      longestSide > 90 ||
      lengthPlusGirth > 120
    ) {
      oversizeSurcharge = 85;
      surchargeDetails += `
        <span class="surcharge">超大尺寸費用：$85</span><br>
        觸發條件：最長邊 ${longestSide} in、長度加周長 ${lengthPlusGirth} in<br>
      `;
    }

    if (chargeableLb >= 50) {
      weightSurcharge = 35;
      surchargeDetails += `
        <span class="surcharge">額外服務附加費 – 重量：$35</span><br>
        觸發條件：計費重量 ${chargeableLb} lb 達 50 lb 以上<br>
      `;
    }

    if (!surchargeDetails) {
      surchargeDetails = '無附加費<br>';
    }

    const packageSurcharge = dimensionSurcharge + oversizeSurcharge + weightSurcharge;

    const packageBeforeDiscountWithoutSurcharge =
      internationalBeforeDiscount + usDomesticFee + twServiceFee + innerBoxFee;

    const packageAfterDiscountWithoutSurcharge =
      internationalAfterDiscount + usDomesticFee + twServiceFee + innerBoxFee;

    const packageBeforeDiscount =
      packageBeforeDiscountWithoutSurcharge + packageSurcharge;

    const packageAfterDiscount =
      packageAfterDiscountWithoutSurcharge + packageSurcharge;

    totalBeforeDiscountUsd += packageBeforeDiscount;
    totalAfterDiscountUsd += packageAfterDiscount;
    totalSurchargeUsd += packageSurcharge;

    resultHtml += `
      <div class="package-result">
        <h3>包裹 ${i} 計算結果</h3>
        轉換後尺寸：${lengthIn} × ${widthIn} × ${heightIn} 英寸<br>
        最長邊：${longestSide} 英寸<br>
        第二長邊：${secondLongestSide} 英寸<br>
        長度加周長：${longestSide} + 2 × ${secondLongestSide} + 2 × ${shortestSide} = ${lengthPlusGirth} 英寸<br>
        材積重：${volumetricLb} 磅<br>
        外箱實際重：${actualLb} 磅<br>
        計費重量：${chargeableLb} 磅<br>
        內箱件數：${innerCount} 件<br>

        <hr>
        <b>基本明細計算方式：</b><br>
        折扣前 $4.99 運費：${chargeableLb} × $4.99 = $${internationalBeforeDiscount.toFixed(2)}<br>
        折扣後 $4.99 運費：$${internationalBeforeDiscount.toFixed(2)} × ${finalDiscountRate} = $${internationalAfterDiscount.toFixed(2)}<br>
        美國國內運費：${chargeableLb} × $1.2 = $${usDomesticFee.toFixed(2)}<br>
        ${twServiceFeeText}<br>
        內箱服務費：${innerCount} × $6 = $${innerBoxFee.toFixed(2)}<br>

        <hr>
        <b>附加費明細：</b><br>
        ${surchargeDetails}
        附加費小計：$${packageSurcharge.toFixed(2)}<br>

        <hr>
        包裹 ${i} 折扣前金額：$${packageBeforeDiscountWithoutSurcharge.toFixed(2)} + 附加費 $${packageSurcharge.toFixed(2)} = $${packageBeforeDiscount.toFixed(2)} 美元<br>
        包裹 ${i} 折扣後金額：$${packageAfterDiscountWithoutSurcharge.toFixed(2)} + 附加費 $${packageSurcharge.toFixed(2)} = $${packageAfterDiscount.toFixed(2)} 美元<br>
      </div>
    `;
  }

  let customRate = null;

  const url = 'https://script.google.com/macros/s/AKfycbx6jRRXCt3xgWVQBulc945UAe6nS1HtaxDVcvxixzYbNdDT7iY_nir4EzvRyGRtXA/exec';

  try {
    const res = await fetch(url, { cache: 'no-cache' });
    const status = `HTTP ${res.status} ${res.statusText}`;

    try {
      const json = await res.json();
      debugMsg += `自動抓取成功(JSON) — ${status}<br>`;
      debugMsg += `回傳 JSON (前 800 字): <pre>${JSON.stringify(json).slice(0,800)}</pre><br>`;
      const found = findRateInObj(json);
      if (found) {
        customRate = found;
        debugMsg += `偵測到匯率: ${customRate}<br>`;
      } else {
        debugMsg += 'JSON 中未找到合理匯率<br>';
      }
    } catch {
      const txt = await res.text();
      debugMsg += `自動抓取成功(文字) — ${status}<br>`;
      debugMsg += `回傳文字 (前 800 字): <pre>${txt.slice(0,800)}</pre><br>`;
      const matches = txt.match(/([0-9]+(?:\\.[0-9]+)?)/g);
      if (matches) {
        for (const m of matches) {
          const v = parseFloat(m);
          if (v > 1 && v < 200) {
            customRate = v;
            debugMsg += `擷取到匯率: ${customRate}<br>`;
            break;
          }
        }
      }
    }
  } catch (err) {
    debugMsg += `自動抓取失敗：${err.message}<br>`;
  }

  let customRateDisplay = 'N/A';
  let twdBeforeDiscount = 'N/A';
  let twdAfterDiscount = 'N/A';

  if (Number.isFinite(customRate) && customRate > 0) {
    const finalRate = customRate + 0.8;
    customRateDisplay = finalRate.toFixed(3);
    twdBeforeDiscount = Math.ceil(totalBeforeDiscountUsd * finalRate);
    twdAfterDiscount = Math.ceil(totalAfterDiscountUsd * finalRate);
  } else {
    debugMsg += '未取得匯率，台幣顯示為 N/A<br>';
  }

  document.getElementById('output').innerHTML = `
    ${resultHtml}
    <div class="total-box">
      <h3>加總運費</h3>
      會員折扣：${finalDiscountRate}<br>
      附加費總額：$${totalSurchargeUsd.toFixed(2)} 美元<br>
      <hr>
      折扣前總金額：$${totalBeforeDiscountUsd.toFixed(2)} 美元<br>
      折扣後總金額：$${totalAfterDiscountUsd.toFixed(2)} 美元<br>
      <hr>
      折扣前台幣金額：約 NT$${twdBeforeDiscount}<br>
      折扣後台幣金額：約 NT$${twdAfterDiscount}<br>
      使用匯率：1 USD = NT$${customRateDisplay}<br>
      今日日期：${new Date().toLocaleDateString()}<br>
    </div>
  `;

  if (debugMsg) {
    debugEl.innerHTML = debugMsg;
  }
}

renderPackages();
</script>
</body>
</html>
